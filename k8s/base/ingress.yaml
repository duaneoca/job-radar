# NGINX Ingress — load balancer entry point
# Install NGINX ingress controller on k3s:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/cloud/deploy.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobradar-ingress
  namespace: jobradar
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: jobradar.yourdomain.com   # replace with your actual domain / EC2 IP
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: jobradar-tracker-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jobradar-frontend
                port:
                  number: 80
