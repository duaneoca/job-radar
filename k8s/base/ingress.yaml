# Traefik Ingress — routes all traffic to the frontend (nginx).
# Nginx handles API proxying to jobradar-tracker-api internally.
#
# k3s ships with Traefik as the default ingress controller.
# To expose on a custom domain, add:
#   spec.rules[0].host: your.domain.com

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobradar-ingress
  namespace: jobradar
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jobradar-frontend
                port:
                  number: 80
