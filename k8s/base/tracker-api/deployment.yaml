apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobradar-tracker-api
  namespace: jobradar
  labels:
    app: tracker-api
    project: jobradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tracker-api
  template:
    metadata:
      labels:
        app: tracker-api
    spec:
      containers:
        - name: tracker-api
          # Image is overridden per-environment by Kustomize / CI
          image: ghcr.io/OWNER/jobradar-tracker-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tracker-api-config
            - secretRef:
                name: tracker-api-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 30
