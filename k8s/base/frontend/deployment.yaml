apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobradar-frontend
  namespace: jobradar
  labels:
    app: frontend
    project: jobradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Image tag is overridden by CI via `kubectl set image` on every deploy.
          image: ghcr.io/duaneoca/jobradar-frontend:staging
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
