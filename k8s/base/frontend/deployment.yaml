apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobradar-frontend
  namespace: jobradar
  labels:
    app: frontend
    project: jobradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Image is overridden per-environment by Kustomize / CI
          image: ghcr.io/OWNER/jobradar-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
