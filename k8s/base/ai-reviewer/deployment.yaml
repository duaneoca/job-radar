apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobradar-ai-reviewer
  namespace: jobradar
  labels:
    app: ai-reviewer
    project: jobradar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-reviewer
  template:
    metadata:
      labels:
        app: ai-reviewer
    spec:
      containers:
        - name: ai-reviewer
          # Image tag is overridden by CI via `kubectl set image` on every deploy.
          image: ghcr.io/duaneoca/jobradar-ai-reviewer:staging
          envFrom:
            - configMapRef:
                name: tracker-api-config   # shares REDIS_URL and TRACKER_API_URL
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
