apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobradar-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: job-radar.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jobradar-frontend
                port:
                  number: 80
