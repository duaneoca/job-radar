# ─────────────────────────────────────────────────────────────
# Deploy to Production — triggers on Git tag v*.*.*
# Promotes the tagged images from staging to production.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
# ─────────────────────────────────────────────────────────────

name: Deploy — Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/jobradar

jobs:

  tag-and-deploy:
    name: Tag images and deploy to production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag images for production
        # The staging images were already built; we just retag them
        run: |
          for svc in tracker-api scraper ai-reviewer email-monitor frontend; do
            docker pull ${{ env.IMAGE_PREFIX }}-${svc}:staging
            docker tag  ${{ env.IMAGE_PREFIX }}-${svc}:staging \
                        ${{ env.IMAGE_PREFIX }}-${svc}:${{ github.ref_name }}
            docker tag  ${{ env.IMAGE_PREFIX }}-${svc}:staging \
                        ${{ env.IMAGE_PREFIX }}-${svc}:latest
            docker push ${{ env.IMAGE_PREFIX }}-${svc}:${{ github.ref_name }}
            docker push ${{ env.IMAGE_PREFIX }}-${svc}:latest
          done

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Kustomize
        run: kubectl apply -k k8s/overlays/production

      - name: Update image tags
        run: |
          for svc in tracker-api; do
            kubectl set image deployment/jobradar-${svc} \
              ${svc}=${{ env.IMAGE_PREFIX }}-${svc}:${{ github.ref_name }} \
              -n jobradar-production
          done

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/jobradar-tracker-api \
            -n jobradar-production --timeout=180s

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
