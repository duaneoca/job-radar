# ─────────────────────────────────────────────────────────────
# PR Workflow — runs on every pull request to main
# Lints, tests, and validates Docker builds. No deployment.
# ─────────────────────────────────────────────────────────────

name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:

  test-tracker-api:
    name: Test tracker-api
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/tracker-api/requirements.txt

      - name: Install dependencies
        working-directory: services/tracker-api
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: services/tracker-api
        run: pytest --tb=short -q

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint tracker-api
        run: ruff check services/tracker-api/app

      - name: Lint scraper
        run: ruff check services/scraper/app

      - name: Lint ai-reviewer
        run: ruff check services/ai-reviewer/app

      - name: Lint email-monitor
        run: ruff check services/email-monitor/app

  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [tracker-api, scraper, ai-reviewer, email-monitor]

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build services/${{ matrix.service }} \
            -t jobradar-${{ matrix.service }}:pr-${{ github.sha }} \
            --no-cache
