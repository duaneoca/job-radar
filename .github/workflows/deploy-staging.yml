# ─────────────────────────────────────────────────────────────
# Deploy to Staging — triggers on push to main
# Builds images → pushes to GHCR → deploys to k3s staging
# ─────────────────────────────────────────────────────────────

name: Deploy — Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/jobradar

jobs:

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/tracker-api/requirements.txt
      - run: pip install -r services/tracker-api/requirements.txt
      - run: pytest services/tracker-api --tb=short -q

  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [tracker-api, scraper, ai-reviewer, email-monitor, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:staging
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        # KUBECONFIG_STAGING is the base64-encoded kubeconfig stored as a repo secret
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Kustomize
        run: |
          kubectl apply -k k8s/overlays/staging

      - name: Update image tags
        run: |
          for svc in tracker-api; do
            kubectl set image deployment/jobradar-${svc} \
              ${svc}=${{ env.IMAGE_PREFIX }}-${svc}:${{ github.sha }} \
              -n jobradar-staging
          done

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/jobradar-tracker-api -n jobradar-staging --timeout=120s
