server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forward backend routes to tracker-api ────────
    # All API paths are proxied; React Router paths are served below.
    location ~ ^/(auth|jobs|criteria|profile|admin|keys|connections|generate|health|docs|redoc|openapi\.json) {
        proxy_pass         http://jobradar-tracker-api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Forward cookies so JWT auth works
        proxy_pass_request_headers on;
    }

    # ── React SPA — serve index.html for all client-side routes ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
