server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Internal service-to-service endpoints — NOT for the public ──
    # These have no user auth and some return decrypted secrets
    # (/criteria/scraper/user-configs) or mutate data (/admin/internal/*).
    # In-cluster callers (scraper, ai-reviewer) reach tracker-api directly and
    # bypass this proxy, so denying them here is safe. `^~` outranks `/api/`.
    location ^~ /api/criteria/scraper/ { return 404; }
    location ^~ /api/jobs/internal/    { return 404; }
    location ^~ /api/admin/internal/   { return 404; }
    # /agent/config returns DECRYPTED LLM key + email creds. Per H6a it is only
    # used by the in-cluster (cloud) agent via the direct path; self-hosted local
    # agents use their own local .env creds. Block it from the public proxy.
    # The rest of /agent/* stays reachable (X-Agent-Key auth).
    location = /api/agent/config       { return 404; }

    # ── Block the no-auth AI-review write endpoint from the public.
    # ai-reviewer posts scores in-cluster (direct); the frontend never calls it.
    location ~ ^/api/jobs/[^/]+/ai-review$ { return 404; }

    # ── POST /jobs is the scraper-only (no-auth) write endpoint. Allow the
    # authenticated GET /jobs list, deny public writes (scraper posts in-cluster).
    location = /api/jobs {
        limit_except GET HEAD { deny all; }
        proxy_pass         http://jobradar-tracker-api/jobs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Internal-User-Id "";   # never honored from public
    }

    # ── API proxy — /api/* → tracker-api (prefix stripped) ───────
    location /api/ {
        proxy_pass         http://jobradar-tracker-api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Strip the internal-impersonation header: get_current_user trusts
        # X-Internal-User-Id to act as any user. Only in-cluster callers (which
        # bypass this proxy) may set it; the public never can.
        proxy_set_header   X-Internal-User-Id "";
        proxy_pass_request_headers on;
    }

    # ── React SPA — serve index.html for all client-side routes ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
