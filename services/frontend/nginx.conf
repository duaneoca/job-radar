server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Internal service-to-service endpoints — NOT for the public ──
    # These have no user auth and some return decrypted secrets
    # (/criteria/scraper/user-configs) or mutate data (/admin/internal/*).
    # In-cluster callers (scraper, ai-reviewer) reach tracker-api directly and
    # bypass this proxy, so denying them here is safe. `^~` outranks `/api/`.
    location ^~ /api/criteria/scraper/ { return 404; }
    location ^~ /api/jobs/internal/    { return 404; }
    location ^~ /api/admin/internal/   { return 404; }

    # ── API proxy — /api/* → tracker-api (prefix stripped) ───────
    location /api/ {
        proxy_pass         http://jobradar-tracker-api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # ── React SPA — serve index.html for all client-side routes ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
